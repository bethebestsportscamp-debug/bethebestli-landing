<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | BTB Lacrosse</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            background: var(--gray-900);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-page {
            padding: 24px;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(8rem, 20vw, 14rem);
            line-height: 1;
            letter-spacing: 6px;
            color: var(--red);
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s var(--ease-out) 0.1s forwards;
        }

        .error-subtitle {
            font-family: var(--font-heading);
            font-size: clamp(1.4rem, 3vw, 2rem);
            letter-spacing: 6px;
            color: var(--gray-300);
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s var(--ease-out) 0.3s forwards;
        }

        .error-message {
            font-size: 0.95rem;
            color: var(--gray-500);
            max-width: 420px;
            margin: 0 auto 40px;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s var(--ease-out) 0.5s forwards;
        }

        .error-cta {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s var(--ease-out) 0.7s forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="error-page">
        <div class="error-code">404</div>
        <div class="error-subtitle">PAGE NOT FOUND</div>
        <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-cta">
            <a href="index.html" class="btn btn--red btn--lg">Back to Home</a>
        </div>
    </div>

</body>
</html>
