[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  function = "site-gate"
  path = "/*"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Identity — route confirmation/recovery/invite tokens to the SPA
[[redirects]]
  from = "/confirmation"
  to = "/login#confirmation_token=:token"
  status = 302
  query = { confirmation_token = ":token" }

[[redirects]]
  from = "/recovery"
  to = "/login#recovery_token=:token"
  status = 302
  query = { token = ":token" }

[[redirects]]
  from = "/invite"
  to = "/login#invite_token=:token"
  status = 302
  query = { token = ":token" }
