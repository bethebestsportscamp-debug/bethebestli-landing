<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>BTB Lacrosse | Long Island's Premier Lacrosse Program</title>
    <meta name="description" content="BTB Lacrosse — Long Island's premier lacrosse development program for boys and girls. Elite coaching, competitive play, and a proven path to college.">
    <meta name="theme-color" content="#D22630">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Logo ── */
        .logo {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: fadeDown 0.8s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        .logo img {
            height: 56px;
            width: auto;
            filter: drop-shadow(0 2px 12px rgba(0,0,0,0.4));
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 6px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* ── Split ── */
        .split {
            display: flex;
            height: 100vh;
        }

        .side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            transition: flex 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .split:hover .side:not(:hover) { flex: 0.82; }
        .split:hover .side:hover { flex: 1.18; }

        .side::before {
            content: '';
            position: absolute;
            inset: 0;
            transition: opacity 0.5s ease;
            z-index: 1;
        }

        /* Boys */
        .side--boys {
            background: linear-gradient(160deg, #D22630 0%, #A01E26 100%);
        }

        .side--boys::before {
            background: rgba(0, 0, 0, 0.08);
        }

        .side--boys:hover::before { opacity: 0; }

        /* Girls */
        .side--girls {
            background: var(--white, #fff);
        }

        .side--girls::before {
            background: rgba(0, 0, 0, 0.02);
        }

        .side--girls:hover::before { opacity: 0; }

        /* ── Divider ── */
        .divider {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 100%;
            background: rgba(0, 0, 0, 0.08);
            z-index: 5;
            pointer-events: none;
        }

        /* ── Content ── */
        .side__content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .side__icon {
            margin-bottom: 1.5rem;
            opacity: 0.85;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }

        .side:hover .side__icon {
            transform: scale(1.12);
            opacity: 1;
        }

        .side__title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 6vw, 5rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 1rem;
            transition: letter-spacing 0.5s ease;
        }

        .side:hover .side__title { letter-spacing: 12px; }

        .side--boys .side__title { color: #fff; }
        .side--girls .side__title { color: #D22630; }

        .side__enter {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.4s ease, letter-spacing 0.4s ease;
        }

        .side--boys .side__enter { color: rgba(255, 255, 255, 0.45); }
        .side--boys:hover .side__enter { color: rgba(255, 255, 255, 0.9); letter-spacing: 5px; }

        .side--girls .side__enter { color: rgba(210, 38, 48, 0.35); }
        .side--girls:hover .side__enter { color: rgba(210, 38, 48, 0.8); letter-spacing: 5px; }

        .side__arrow {
            display: inline-block;
            opacity: 0;
            transform: translateX(-8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .side:hover .side__arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* ── Accent ── */
        .accent {
            width: 40px;
            height: 2px;
            margin: 1.5rem auto;
            transition: width 0.4s ease;
        }

        .side:hover .accent { width: 60px; }

        .side--boys .accent { background: #fff; }
        .side--girls .accent { background: #D22630; }

        .side--girls .side__content { color: #1a1a1a; }

        /* ── Animations ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .side--boys .side__content {
            animation: fadeUp 0.7s 0.2s cubic-bezier(0, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        .side--girls .side__content {
            animation: fadeUp 0.7s 0.35s cubic-bezier(0, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .split { flex-direction: column; }
            .split:hover .side:not(:hover) { flex: 1; }
            .split:hover .side:hover { flex: 1; }

            .divider {
                top: 50%;
                left: 0;
                width: 100%;
                height: 1px;
                transform: none;
            }

            .side__title { font-size: 2.8rem; }

            .logo img { height: 44px; }
            .logo-text { font-size: 0.75rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="logo">
        <img src="assets/btb-logo-flat.svg" alt="BTB Lacrosse" onerror="this.style.display='none'">
        <span class="logo-text">BTB Lacrosse</span>
    </div>

    <div class="divider"></div>

    <div class="split">
        <a href="academy-boys.html" class="side side--boys">
            <div class="side__content">
                <div class="side__icon">
                    <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.06)"/>
                        <path d="M24 14L24 34M18 20L24 14L30 20" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 class="side__title">Boys</h2>
                <div class="accent"></div>
                <span class="side__enter">Enter <span class="side__arrow">&rarr;</span></span>
            </div>
        </a>

        <a href="academy-girls.html" class="side side--girls">
            <div class="side__content">
                <div class="side__icon">
                    <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="22" stroke="#D22630" stroke-width="1.5" fill="rgba(210,38,48,0.06)"/>
                        <path d="M24 14L24 34M18 20L24 14L30 20" stroke="#D22630" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 class="side__title">Girls</h2>
                <div class="accent"></div>
                <span class="side__enter">Enter <span class="side__arrow">&rarr;</span></span>
            </div>
        </a>
    </div>

</body>
</html>
